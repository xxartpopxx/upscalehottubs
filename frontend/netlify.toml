[build]
  publish = "build"
  command = "npm install --legacy-peer-deps && npx puppeteer browsers install chrome && npm run build"

[build.environment]
  # Cache Puppeteer's Chromium download inside the build dir so Netlify's
  # cache picks it up between deploys (faster builds, no re-download).
  PUPPETEER_CACHE_DIR = "/opt/buildhome/.cache/puppeteer"
  # Don't let CRA treat ESLint warnings as build-breaking errors on Netlify
  CI = "false"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
